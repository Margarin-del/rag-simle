stages:
  - test
  - build
  - docker-build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Кэширование зависимостей Gradle
cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches

# Этап: Тестирование
test:
  stage: test
  image: gradle:8.5-jdk21
  script:
    - gradle test
  only:
    - main
    - develop
    - merge_requests

# Этап: Сборка
build:
  stage: build
  image: gradle:8.5-jdk21
  script:
    - gradle clean build -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 hour
  only:
    - main
    - develop

# Этап: Сборка Docker образа
docker-build:
  stage: docker-build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - develop

# Этап: Деплой на staging
deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST "
      docker pull $DOCKER_IMAGE_LATEST &&
      docker stop rag-app || true &&
      docker rm rag-app || true &&
      docker run -d --name rag-app \
      -p 8080:8080 \
      -e DB_HOST=$DB_HOST \
      -e DB_PORT=$DB_PORT \
      -e DB_NAME=$DB_NAME \
      -e DB_USER=$DB_USER \
      -e DB_PASSWORD=$DB_PASSWORD \
      -e KAFKA_BOOTSTRAP_SERVERS=$KAFKA_BOOTSTRAP_SERVERS \
      -e OLLAMA_BASE_URL=$OLLAMA_BASE_URL \
      --restart unless-stopped \
      $DOCKER_IMAGE_LATEST
      "
  environment:
    name: staging
    url: http://staging.rag-system.com
  only:
    - develop

# Этап: Деплой на production (blue-green deployment)
deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  script:
    - ssh -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST "
      # Blue-Green deployment
      docker pull $DOCKER_IMAGE_LATEST &&
      
      # Check current active color
      if docker ps | grep -q rag-app-blue; then
      CURRENT_COLOR=blue
      NEW_COLOR=green
      else
      CURRENT_COLOR=green
      NEW_COLOR=blue
      fi

      echo \"Current: $CURRENT_COLOR, New: $NEW_COLOR\"

      # Start new container
      docker run -d --name rag-app-$NEW_COLOR \
      -p 8081:8080 \
      -e DB_HOST=$DB_HOST \
      -e DB_PORT=$DB_PORT \
      -e DB_NAME=$DB_NAME \
      -e DB_USER=$DB_USER \
      -e DB_PASSWORD=$DB_PASSWORD \
      -e KAFKA_BOOTSTRAP_SERVERS=$KAFKA_BOOTSTRAP_SERVERS \
      -e OLLAMA_BASE_URL=$OLLAMA_BASE_URL \
      --restart unless-stopped \
      $DOCKER_IMAGE_LATEST
      
      # Wait for new container to be ready
      sleep 10
      
      # Switch traffic
      docker exec rag-proxy nginx -s reload || true
      
      # Stop and remove old container
      docker stop rag-app-$CURRENT_COLOR || true
      docker rm rag-app-$CURRENT_COLOR || true
      "
  environment:
    name: production
    url: http://rag-system.com
  only:
    - main
  when: manual