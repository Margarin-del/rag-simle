spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ragdb}
    username: ${DB_USER:raguser}
    password: ${DB_PASSWORD:ragpass}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}

logging:
  level:
    com.rag: INFO
  loki:
    enabled: ${LOGGING_LOKI_ENABLED:false}